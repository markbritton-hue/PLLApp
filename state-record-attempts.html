<!DOCTYPE html>

            font-weight: 600;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn-home:hover { background: rgba(30,41,59,1); transform: translateY(-2px); color: white; }

        .page-header { text-align: center; margin-bottom: 30px; }
        .page-header h1 {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .page-header p { color: rgba(255,255,255,0.65); font-size: 1rem; }

        .meet-name { color: #60a5fa; font-size: 0.95rem; margin-top: 4px; font-style: italic; }

        .record-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(245,158,11,0.4);
            border-radius: 14px; padding: 20px; margin-bottom: 16px;

        .athlete-meta { color: rgba(255,255,255,0.55); font-size: 0.85rem; margin-top: 2px; }

        .attempt-weight { font-size: 1.4rem; font-weight: 800; color: white; }

        .record-holder { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 1px; }
        .margin-badge {

        .gender-btn {

    const BUILTIN_W_RECORDS = {}; // Women's records not yet loaded

    const MEN_WC   = ['114','123','132','145','155','165','181','194','207','220','242','275','SHW'];
    const WOMEN_WC = ['97','105','114','123','132','148','165','181','198','SHW'];

    // ─── State ────────────────────────────────────────────────────────────────
    let currentGender = 'M';
    let editorGender  = 'M';
    let athletes = [];

    function getStorageKey(g) { return `trplStateRecords2_${g}`; }

    function loadRecords(g) {
        try {
            const stored = localStorage.getItem(getStorageKey(g));
            if (stored) return JSON.parse(stored);
        } catch(e) {}
        return g === 'M' ? JSON.parse(JSON.stringify(BUILTIN_M_RECORDS))
                         : JSON.parse(JSON.stringify(BUILTIN_W_RECORDS));
    }

    function setGender(g) {
        currentGender = g;
        document.getElementById('btnMen').className   = 'gender-btn' + (g === 'M' ? ' active-men' : '');
        document.getElementById('btnWomen').className = 'gender-btn' + (g === 'W' ? ' active-women' : '');
        renderAttempts();
    }

    // ─── Sheet title detection ─────────────────────────────────────────────────
    async function detectGenderFromSheet(spreadsheetId) {
        try {
            const resp = await fetch(`https://docs.google.com/spreadsheets/d/${spreadsheetId}/htmlview`);
            const html = await resp.text();
            const match = html.match(/<title>([^<]+)<\/title>/);
            if (match) {
                const title = match[1].toLowerCase();
                document.getElementById('meetName').textContent = match[1].replace(' - Google Sheets','').trim();
                if (title.includes('women') || title.includes('female')) return 'W';
                if (title.includes('men') || title.includes('male'))   return 'M';
            }
        } catch(e) {}
        return null;
    }

    // ─── CSV / athlete loading (same proven logic as display.html) ────────────
    async function loadPlatformData(spreadsheetId, gid) {
        const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${gid}&t=${Date.now()}`;
        let response;
        try {
            response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) throw new Error('Direct fetch failed');
        } catch(e) {
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            response = await fetch(proxyUrl, { cache: 'no-store' });
        }
        const text = await response.text();
        return parseAthletes(parseCSV(text));
    }

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const result = [];
        for (let line of lines) {
            if (!line.trim()) continue;
            const values = [];
            let current = '', inQuotes = false;
            for (let j = 0; j < line.length; j++) {
                const char = line[j];
                if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { values.push(current.trim().replace(/^"|"$/g,'')); current = ''; }
                else { current += char; }
            }
            values.push(current.trim().replace(/^"|"$/g,''));
            result.push(values);
        }
        return result;
    }

    function parseAthletes(csvData) {
        const athletes = [];
        let headerRow = -1;
        let nameCol=-1, schoolCol=-1, weightClassCol=-1, bodyWeightCol=-1, totalCol=-1;
        let squat1Col=-1, squat2Col=-1, squat3Col=-1;
        let bench1Col=-1, bench2Col=-1, bench3Col=-1;
        let dead1Col=-1, dead2Col=-1, dead3Col=-1;

        for (let i = 0; i < Math.min(15, csvData.length); i++) {
            const row = csvData[i];
            for (let j = 0; j < row.length; j++) {
                const cell = row[j].toLowerCase().trim();
                if ((cell === 'name' || cell === 'lifter') && nameCol === -1) nameCol = j;
                if (cell === 'school' && schoolCol === -1) schoolCol = j;
                if ((cell === 'weight class' || cell === 'wt class' || cell === 'wt. class' || cell === 'class' || cell === 'wc' || (cell.includes('wt') && cell.includes('class'))) && weightClassCol === -1) weightClassCol = j;
                if ((cell === 'body weight' || cell === 'bw' || cell === 'bodyweight') && bodyWeightCol === -1) bodyWeightCol = j;
                if (cell === 'total' && totalCol === -1) totalCol = j;
                if ((cell === 'squat 1' || cell === 'sq1' || cell === 'squat1' || cell === 'f') && squat1Col === -1) squat1Col = j;
                if ((cell === 'squat 2' || cell === 'sq2' || cell === 'squat2') && squat2Col === -1) squat2Col = j;
                if ((cell === 'squat 3' || cell === 'sq3' || cell === 'squat3') && squat3Col === -1) squat3Col = j;
                if ((cell === 'bench 1' || cell === 'bp1' || cell === 'bench1') && bench1Col === -1) bench1Col = j;
                if ((cell === 'bench 2' || cell === 'bp2' || cell === 'bench2') && bench2Col === -1) bench2Col = j;
                if ((cell === 'bench 3' || cell === 'bp3' || cell === 'bench3') && bench3Col === -1) bench3Col = j;
                if ((cell === 'deadlift 1' || cell === 'dead 1' || cell === 'dl1' || cell === 'deal lift 1') && dead1Col === -1) dead1Col = j;
                if ((cell === 'deadlift 2' || cell === 'dead 2' || cell === 'dl2' || cell === 'dead lift 2') && dead2Col === -1) dead2Col = j;
                if ((cell === 'deadlift 3' || cell === 'dead 3' || cell === 'dl3' || cell === 'dead lift 3') && dead3Col === -1) dead3Col = j;
            }
            if (nameCol !== -1 && schoolCol !== -1) { headerRow = i; break; }
        }

        if (headerRow === -1) return athletes;

        function scanSubHeaderRow(row) {
            for (let j = 0; j < row.length; j++) {
                const cell = row[j].toLowerCase().trim();
                if ((cell === 'squat 1' || cell === 'sq1' || cell === 'sq 1' || cell === 'squat1') && squat1Col === -1) squat1Col = j;
                if ((cell === 'squat 2' || cell === 'sq2' || cell === 'sq 2' || cell === 'squat2') && squat2Col === -1) {
                    squat2Col = j;
                    if (squat1Col === -1 && j > 0) squat1Col = j - 1;
                    if (squat3Col === -1 && j < row.length - 1) squat3Col = j + 1;
                }
                if ((cell === 'squat 3' || cell === 'sq3' || cell === 'sq 3' || cell === 'squat3') && squat3Col === -1) squat3Col = j;
                if ((cell === 'bench 1' || cell === 'bp1' || cell === 'bp 1' || cell === 'bench1') && bench1Col === -1) bench1Col = j;
                if ((cell === 'bench 2' || cell === 'bp2' || cell === 'bp 2' || cell === 'bench2') && bench2Col === -1) {
                    bench2Col = j;
                    if (bench1Col === -1 && j > 0) bench1Col = j - 1;
                    if (bench3Col === -1 && j < row.length - 1) bench3Col = j + 1;
                }
                if ((cell === 'bench 3' || cell === 'bp3' || cell === 'bp 3' || cell === 'bench3') && bench3Col === -1) bench3Col = j;
                if ((cell === 'dead lift 1' || cell === 'deal lift 1' || cell === 'dl1' || cell === 'dl 1' || cell === 'deadlift 1' || cell === 'dead 1') && dead1Col === -1) dead1Col = j;
                if ((cell === 'dead lift 2' || cell === 'dl2' || cell === 'dl 2' || cell === 'deadlift 2' || cell === 'dead 2') && dead2Col === -1) {
                    dead2Col = j;
                    if (dead1Col === -1 && j > 0) dead1Col = j - 1;
                    if (dead3Col === -1 && j < row.length - 1) dead3Col = j + 1;
                }
                if ((cell === 'dead lift 3' || cell === 'dl3' || cell === 'dl 3' || cell === 'deadlift 3' || cell === 'dead 3') && dead3Col === -1) dead3Col = j;
            }
        }
        if (csvData[headerRow + 1]) { scanSubHeaderRow(csvData[headerRow + 1]); headerRow = headerRow + 1; }
        if (squat1Col === -1 && bench1Col === -1 && dead1Col === -1 && csvData[headerRow + 1]) {
            scanSubHeaderRow(csvData[headerRow + 1]); headerRow = headerRow + 1;
        }
        if (squat1Col !== -1 && squat2Col !== -1 && squat3Col === -1) squat3Col = squat2Col + 1;
        if (bench1Col !== -1 && bench2Col !== -1 && bench3Col === -1) bench3Col = bench2Col + 1;
        if (dead1Col  !== -1 && dead2Col  !== -1 && dead3Col  === -1) dead3Col  = dead2Col  + 1;

        for (let i = headerRow + 1; i < csvData.length; i++) {
            const row = csvData[i];
            if (row.length <= nameCol) continue;
            const name = row[nameCol]?.trim();
            if (!name) continue;
            const rawWc = weightClassCol !== -1 ? row[weightClassCol]?.trim() : '';
            const designation = rawWc?.toUpperCase().includes('JV') ? 'JV' : 'V';
            const weightClass = rawWc?.match(/(\d+)/)?.[1] || rawWc;
            athletes.push({
                name, school: schoolCol !== -1 ? row[schoolCol]?.trim() : '',
                designation, weightClass,
                bodyWeight: bodyWeightCol !== -1 ? parseFloat(row[bodyWeightCol]) || 0 : 0,
                total: totalCol !== -1 ? parseFloat(row[totalCol]) || 0 : 0,
                squat1: squat1Col !== -1 ? row[squat1Col]?.trim() : '',
                squat2: squat2Col !== -1 ? row[squat2Col]?.trim() : '',
                squat3: squat3Col !== -1 ? row[squat3Col]?.trim() : '',
                bench1: bench1Col !== -1 ? row[bench1Col]?.trim() : '',
                bench2: bench2Col !== -1 ? row[bench2Col]?.trim() : '',
                bench3: bench3Col !== -1 ? row[bench3Col]?.trim() : '',
                dead1:  dead1Col  !== -1 ? row[dead1Col]?.trim()  : '',
                dead2:  dead2Col  !== -1 ? row[dead2Col]?.trim()  : '',
                dead3:  dead3Col  !== -1 ? row[dead3Col]?.trim()  : '',
            });
        }
        return athletes;
    }

    function getCurrentAttemptColumn(athletes) {
        const cols = ['squat1','squat2','squat3','bench1','bench2','bench3','dead1','dead2','dead3'];
        for (const col of cols) {
            if (athletes.some(a => { const v = a[col]; return v && !v.toLowerCase().includes('g') && !v.toLowerCase().includes('x'); })) return col;
        }
        return null;
    }

    function hasPendingInColumn(athlete, column) {
        if (!column) return false;
        const v = athlete[column];
        return v && !v.toLowerCase().includes('g') && !v.toLowerCase().includes('x');
    }

    function getPlatformPosition(athlete, platformAthletes) {
        const col = getCurrentAttemptColumn(platformAthletes);
        const sorted = [...platformAthletes].sort((a, b) => {
            const ap = hasPendingInColumn(a, col), bp = hasPendingInColumn(b, col);
            if (ap && !bp) return -1; if (!ap && bp) return 1;
            if (ap && bp && col) {
                const aw = parseFloat(a[col].replace(/[xgXG]/g,'').trim()) || 0;
                const bw = parseFloat(b[col].replace(/[xgXG]/g,'').trim()) || 0;
                if (aw !== bw) return aw - bw;
            }
            return a.sheetOrder - b.sheetOrder;
        });
        const idx = sorted.findIndex(a => a.name === athlete.name);
        return idx === -1 ? null : idx + 1;
    }


    function isPending(val) {
        if (!val) return false;
        const v = val.toLowerCase().trim();
        return v !== '' && !v.includes('x') && !v.includes('g');
    }

    function getRecordAttempts(athlete, records) {
        const wc = athlete.weightClass || '';
        // Exact match only (Varsity records only; JV records not yet available)
        const rec = records[wc];
        if (!rec) return [];

        const checks = [
            { lift: 'Squat',    key: 'sq',  attempts: [athlete.squat1, athlete.squat2, athlete.squat3] },
            { lift: 'Bench',    key: 'bp',  attempts: [athlete.bench1, athlete.bench2, athlete.bench3] },
            { lift: 'Deadlift', key: 'dl',  attempts: [athlete.dead1,  athlete.dead2,  athlete.dead3]  },
        ];

        const hits = [];
        checks.forEach(({ lift, key, attempts }) => {
            const stateRec = rec[key];
            if (!stateRec || stateRec.weight === 0) return;
            attempts.forEach((val, idx) => {
                if (!isPending(val)) return;
                const w = parseFloat(val.replace(/[xgXG]/g,'').trim()) || 0;
                if (w > stateRec.weight) {
                    hits.push({ lift, attemptNum: idx+1, weight: w, record: stateRec });
                }
            });
        });

        // Total
        const totalRec = rec.total;
        if (totalRec && totalRec.weight > 0 && athlete.total > 0 && athlete.total > totalRec.weight) {
            hits.push({ lift: 'Total', attemptNum: null, weight: athlete.total, record: totalRec });
        }

        return hits;
    }

    // ─── Render ────────────────────────────────────────────────────────────────
    function renderAttempts() {
        const container = document.getElementById('mainContent');
        const records = loadRecords(currentGender);

        const hasRecords = Object.keys(records).length > 0;
        if (!hasRecords) {
            container.innerHTML = `
                <div class="no-records-msg">
                    <i class="fas fa-trophy"></i>
                    <h4 style="color:rgba(255,255,255,0.7);margin-bottom:10px;">No ${currentGender==='M'?"Men's":"Women's"} Records Configured</h4>
                    <p style="color:rgba(255,255,255,0.4);margin-bottom:20px;">Enter state records to compare against athlete attempts.</p>
                    <button onclick="openEditor()" style="background:#f59e0b;border:none;color:#0f172a;padding:12px 28px;border-radius:8px;font-weight:700;cursor:pointer;">
                        <i class="fas fa-edit me-2"></i>Enter State Records
                    </button>
                </div>`;
            return;
        }

        const seen = new Set();
        const recordAttempts = [];
        athletes.forEach(a => {
            if (seen.has(a.name.toLowerCase())) return;
            seen.add(a.name.toLowerCase());
            if (a.designation !== 'V') return; // Only Varsity for now
            const hits = getRecordAttempts(a, records);
            if (hits.length > 0) recordAttempts.push({ athlete: a, hits });
        });

        if (recordAttempts.length === 0) {
            container.innerHTML = `
                <div class="no-records-msg">
                    <i class="fas fa-check-circle" style="color:#10b981;"></i>
                    <h4 style="color:rgba(255,255,255,0.7);margin-bottom:10px;">No Record Attempts Found</h4>
                    <p style="color:rgba(255,255,255,0.4);">
                        No ${currentGender==='M'?"men's":"women's"} athletes in the current meet have pending attempts above a state record.<br>
                        <small>Note: weight class in platform sheet must match records (e.g. 114, 123, 132…)</small>
                    </p>
                </div>`;
            return;
        }

        container.innerHTML = `<p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:16px;">
            ${recordAttempts.length} athlete${recordAttempts.length!==1?'s':''} with potential record-breaking attempt${recordAttempts.length!==1?'s':''}</p>`;

        recordAttempts.forEach(({ athlete, hits }) => {
            const card = document.createElement('div');
            card.className = 'record-card';
            card.innerHTML = `
                <div class="d-flex align-items-start justify-content-between flex-wrap gap-2">
                    <div>
                        <div class="athlete-name">${athlete.name}</div>
                        <div class="athlete-meta">${athlete.school} &bull; Varsity ${athlete.weightClass} lbs</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <a href="platform.html?gid=${athlete.platformGid}" style="background:rgba(6,182,212,0.15);border:1px solid #06b6d4;color:#06b6d4;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;white-space:nowrap;text-decoration:none;">${athlete.platformName}</a>
                        <span style="background:rgba(96,165,250,0.15);border:1px solid #60a5fa;color:#60a5fa;padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;white-space:nowrap;">Position ${athlete.platformPosition}</span>
                    </div>
                </div>
                ${hits.map(h => {
                    const margin = h.weight - h.record.weight;
                    const pct = ((h.weight / h.record.weight - 1) * 100).toFixed(1);
                    return `
                    <div class="attempt-row">
                        <div class="lift-label">${h.lift}${h.attemptNum ? ` #${h.attemptNum}` : ''}</div>
                        <div class="attempt-weight">${h.weight} <small>lbs</small></div>
                        <div class="record-info">
                            <div class="record-weight">Record: ${h.record.weight} lbs</div>
                            <div class="record-holder">${h.record.name} &bull; ${h.record.school}</div>
                        </div>
                        <div class="margin-badge ${margin <= 5 ? 'close' : ''}">+${margin} lbs</div>
                    </div>`;
                }).join('')}
            `;
            container.appendChild(card);
        });
    }

    // ─── Data load ─────────────────────────────────────────────────────────────
    async function refreshData() {
        const container = document.getElementById('mainContent');
        container.innerHTML = `<div class="no-records-msg"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>`;

        const configStr = localStorage.getItem('trplConfig');
        if (!configStr) {
            container.innerHTML = `<div class="no-records-msg"><i class="fas fa-cog"></i><p>No meet configured. <a href="setup.html" style="color:#f59e0b;">Go to Setup</a></p></div>`;
            return;
        }

        const config = JSON.parse(configStr);
        const platforms = (config.sheets||[]).filter(s => s.name.toLowerCase().startsWith('platform'));

        if (platforms.length === 0) {
            container.innerHTML = `<div class="no-records-msg"><i class="fas fa-exclamation-circle"></i><p>No platform sheets found.</p></div>`;
            return;
        }

        // Auto-detect gender from sheet title
        const detectedGender = await detectGenderFromSheet(config.spreadsheetId);
        if (detectedGender) {
            currentGender = detectedGender;
            document.getElementById('btnMen').className   = 'gender-btn' + (detectedGender==='M' ? ' active-men' : '');
            document.getElementById('btnWomen').className = 'gender-btn' + (detectedGender==='W' ? ' active-women' : '');
        }

        try {
            const platformResults = await Promise.all(platforms.map(async p => {
                try {
                    const list = await loadPlatformData(config.spreadsheetId, p.gid);
                    const col = getCurrentAttemptColumn(list);
                    const sorted = [...list].sort((a, b) => {
                        const ap = hasPendingInColumn(a, col), bp = hasPendingInColumn(b, col);
                        if (ap && !bp) return -1; if (!ap && bp) return 1;
                        if (ap && bp && col) {
                            const aw = parseFloat(a[col].replace(/[xgXG]/g,'').trim()) || 0;
                            const bw = parseFloat(b[col].replace(/[xgXG]/g,'').trim()) || 0;
                            if (aw !== bw) return aw - bw;
                        }
                        return a.sheetOrder - b.sheetOrder;
                    });
                    return list.map(a => ({
                        ...a,
                        platformName: p.name,
                        platformGid: p.gid,
                        platformPosition: sorted.findIndex(s => s.name === a.name) + 1
                    }));
                } catch(e) { return []; }
            }));
            athletes = platformResults.flat();
            renderAttempts();
        } catch(e) {
            container.innerHTML = `<div class="no-records-msg"><i class="fas fa-exclamation-triangle"></i><p>Error: ${e.message}</p></div>`;
        }
    }

    // ─── Editor ────────────────────────────────────────────────────────────────
    function switchEditorGender(g) {
        editorGender = g;
        document.getElementById('editorBtnM').className = 'gender-btn' + (g==='M' ? ' active-men' : '');
        document.getElementById('editorBtnW').className = 'gender-btn' + (g==='W' ? ' active-women' : '');
        buildEditorTable(g);
    }

    function buildEditorTable(g) {
        const wcs = g === 'M' ? MEN_WC : WOMEN_WC;
        const records = loadRecords(g);
        const el = document.getElementById('editorTable');
        el.innerHTML = `
            <table class="records-table w-100">
                <thead>
                    <tr>
                        <th>Wt Class</th>
                        <th>Squat</th><th>Holder</th>
                        <th>Bench</th><th>Holder</th>
                        <th>Deadlift</th><th>Holder</th>
                        <th>Total</th><th>Holder</th>
                    </tr>
                </thead>
                <tbody>
                    ${wcs.map(wc => {
                        const r = records[wc] || {};
                        const f = (key) => {
                            const e = r[key] || {};
                            return `<input type="number" id="w_${g}_${wc}_${key}" value="${e.weight||0}" min="0">
                                    <input type="text"   id="n_${g}_${wc}_${key}" value="${e.name||''}" placeholder="Holder name">`;
                        };
                        return `<tr>
                            <td><strong>${wc}</strong></td>
                            <td colspan="2" style="white-space:nowrap">${f('sq')}</td>
                            <td colspan="2" style="white-space:nowrap">${f('bp')}</td>
                            <td colspan="2" style="white-space:nowrap">${f('dl')}</td>
                            <td colspan="2" style="white-space:nowrap">${f('total')}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;
    }

    function openEditor() {
        editorGender = currentGender;
        document.getElementById('editorBtnM').className = 'gender-btn' + (editorGender==='M' ? ' active-men' : '');
        document.getElementById('editorBtnW').className = 'gender-btn' + (editorGender==='W' ? ' active-women' : '');
        buildEditorTable(editorGender);
        document.getElementById('editorModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeEditor() {
        document.getElementById('editorModal').style.display = 'none';
        document.body.style.overflow = '';
    }

    function saveRecords() {
        const g = editorGender;
        const wcs = g === 'M' ? MEN_WC : WOMEN_WC;
        const records = {};
        wcs.forEach(wc => {
            records[wc] = {};
            ['sq','bp','dl','total'].forEach(key => {
                const w = parseFloat(document.getElementById(`w_${g}_${wc}_${key}`)?.value) || 0;
                const n = document.getElementById(`n_${g}_${wc}_${key}`)?.value || '';
                records[wc][key] = { weight: w, name: n, school: '' };
            });
        });
        localStorage.setItem(getStorageKey(g), JSON.stringify(records));
        closeEditor();
        renderAttempts();
    }

    window.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
