<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerLift Live | Coaches View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .platform-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .platform-name {
            color: #60a5fa;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .athlete-card {
            background: rgba(16, 185, 129, 0.18);
            border: 1px solid rgba(16, 185, 129, 0.7);
            border-left: 4px solid #60a5fa;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            overflow: hidden;
            padding: 14px 16px;
        }

        .athlete-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.6);
        }

        .athlete-card.lifting {
            background: rgba(239, 68, 68, 0.18);
            border-color: rgba(239, 68, 68, 0.7);
            border-left-color: #ef4444;
        }

        .athlete-card.on-deck {
            background: rgba(16, 185, 129, 0.18);
            border-color: rgba(16, 185, 129, 0.7);
            border-left-color: #10b981;
        }

        .athlete-card.done {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(255,255,255,0.12);
            border-left-color: #6b7280;
        }

        .athlete-summary {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .designation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .designation-badge.varsity {
            background: #8b5cf6;
            color: white;
        }

        .designation-badge.jv {
            background: #10b981;
            color: white;
        }

        .expand-arrow {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .total-box {
            background: rgba(139, 92, 246, 0.07);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            margin-top: 8px;
        }

        .total-label {
            font-size: 0.75rem;
            opacity: 0.95;
            font-weight: 600;
        }

        .total-value {
            font-size: 1.2rem;
            font-weight: 800;
            margin-top: 3px;
        }

        .attempt-weight {
            font-size: 1rem;
            font-weight: 600;
            color: #60a5fa;
            margin-left: 12px;
        }

        .status-badge {
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
        }

        .status-badge.lifting {
            background: #ef4444;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .status-badge.on-deck {
            background: #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .status-badge.done {
            background: #6b7280;
        }

        .btn-back {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(30, 41, 59, 1);
            transform: translateY(-2px);
            color: white;
        }

        .athlete-details {
            display: none;
            padding: 14px 16px 16px;
            border-top: 1px solid rgba(255,255,255,0.07);
            background: rgba(0, 0, 0, 0.25);
        }

        .athlete-details.open {
            display: block;
        }

        .attempt-cell {
            text-align: center;
            padding: 6px 4px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .auto-refresh {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            padding: 12px 20px;
            border-radius: 10px;
            color: #10b981;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 8px; margin-bottom: 15px; align-items: center; flex-wrap: nowrap; overflow-x: auto;">
        <a href="index.html" class="btn" style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(96, 165, 250, 0.2); color: white; text-decoration: none; white-space: nowrap; flex-shrink: 0;">
            <i class="fas fa-home me-2"></i>Home
        </a>
        <button id="refreshToggle" onclick="toggleAutoRefresh()" class="btn" style="background: rgba(96, 165, 250, 0.8); border: none; color: white; cursor: pointer; white-space: nowrap; flex-shrink: 0;">
            <i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF
        </button>

        <span id="cacheStatusBadge" style="font-size: 0.75rem; font-family: monospace; padding: 3px 10px; border-radius: 20px; display: none; align-self: center; flex-shrink: 0; white-space: nowrap;"></span>
    </div>

    <div id="announcementToast" style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(236,72,153,0.95); color:white; padding:12px 22px; border-radius:30px; font-size:0.95rem; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,0.5); z-index:9999; opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; white-space:nowrap; max-width:90vw; text-align:center;"></div>

    <div style="text-align: center; margin-bottom: 16px;">
        <h1 style="font-size: 1.3rem; font-weight: 900; color: white; margin: 0;">
            <i class="fas fa-clipboard-user" style="color: #ec4899; margin-right: 8px;"></i>Coaches View
        </h1>
    </div>

    <div id="displayContainer"></div>

    <!-- Donation Card -->
    <div style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(96, 165, 250, 0.4); border-radius: 15px; padding: 25px 30px; text-align: center; margin-top: 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);">
        <h3 style="color: #60a5fa; font-weight: 700; margin-bottom: 8px;"><i class="fas fa-heart me-2" style="color: #ec4899;"></i>Support PowerLift Live</h3>
        <p style="color: rgba(255,255,255,0.7); margin-bottom: 16px;">Donations help cover hosting and keep live results running.</p>
        <a href="https://venmo.com/u/Mark-Britton-18" target="_blank" rel="noopener noreferrer"
           style="display: inline-flex; align-items: center; gap: 12px; background: #008CFF; color: white; text-decoration: none; padding: 14px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; box-shadow: 0 4px 15px rgba(0,140,255,0.4);">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 111 111" fill="white"><path d="M90.5 8.5c3.9 6.4 5.7 13 5.7 21.4 0 26.7-22.8 61.4-41.3 85.8H15.7L1 10.9l38-3.6 7.9 63.7C55.1 55.4 64 30.1 64 16.1c0-8.1-1.4-13.6-3.6-18.1L90.5 8.5z"/></svg>
            Donate via Venmo
        </a>
    </div>

    <script src="state-records-data.js"></script>
    <script>
        let autoRefreshInterval = null;
        let schoolName = '';
        let coachGender = 'M';
        let coachStateRecords = {};
        let lastAnnouncedStatus = null;

        function doSpeak(text, rollbackStatus) {
            if (!window.speechSynthesis) return;
            if (window.speechSynthesis.paused) window.speechSynthesis.resume();
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 0.9; u.pitch = 1.0; u.volume = 1.0;
            u.onerror = function(e) {
                console.log('[Speech] blocked/error:', e.error, '— will retry next refresh');
                // Roll back so next refresh retries (browser needs a user gesture first)
                lastAnnouncedStatus = rollbackStatus !== undefined ? rollbackStatus : null;
            };
            window.speechSynthesis.speak(u);
        }

        function speakAnnouncement(text, rollbackStatus) {
            showAnnouncementToast(text);
            doSpeak(text, rollbackStatus);
        }

        function showAnnouncementToast(text) {
            let toast = document.getElementById('announcementToast');
            if (!toast) return;
            toast.textContent = '🔊 ' + text;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
            }, 4000);
        }

        function getLastLiftResult(athlete) {
            // Check attempts in reverse lifting order: dl3 → dl2 → dl1 → bp3 → ... → sq1
            const attempts = [
                { key: 'dead3', liftKey: 'dl' }, { key: 'dead2', liftKey: 'dl' }, { key: 'dead1', liftKey: 'dl' },
                { key: 'bench3', liftKey: 'bp' }, { key: 'bench2', liftKey: 'bp' }, { key: 'bench1', liftKey: 'bp' },
                { key: 'squat3', liftKey: 'sq' }, { key: 'squat2', liftKey: 'sq' }, { key: 'squat1', liftKey: 'sq' },
            ];
            for (const { key, liftKey } of attempts) {
                const val = athlete[key];
                if (!val || !val.trim()) continue;
                const lower = val.toLowerCase();
                const failed = lower.includes('x');
                const good = lower.includes('g');
                if (!failed && !good) continue;
                if (good) {
                    const num = parseFloat(val.replace(/[xgXG]/gi, '').trim());
                    const isRecord = isStateRecordAttempt(num, liftKey, athlete.weightClass, coachStateRecords);
                    return isRecord ? 'record' : 'good';
                }
                return 'failed';
            }
            return null;
        }

        function announceIfNeeded(athletes, config) {
            if (!config.announcementsEnabled || !config.athleteName) {
                console.log('[Announce] skipped — enabled:', config.announcementsEnabled, 'name:', config.athleteName);
                return;
            }
            const targetName = config.athleteName.toLowerCase().trim();
            const athlete = athletes.find(a => (a.name || '').toLowerCase().trim() === targetName);
            if (!athlete) {
                console.log('[Announce] athlete not found:', targetName, '| available:', athletes.map(a => a.name));
                return;
            }

            let currentStatus;
            if (!athlete.hasPending) {
                currentStatus = 'done';
            } else if (athlete.platformPosition === 1) {
                currentStatus = 'lifting';
            } else if (athlete.platformPosition === 2) {
                currentStatus = 'on-deck';
            } else {
                currentStatus = `position-${athlete.platformPosition}`;
            }

            console.log('[Announce] athlete found, status:', currentStatus, '| last:', lastAnnouncedStatus);
            if (currentStatus === lastAnnouncedStatus) return;

            let text = null;
            const name = config.athleteName;
            const platform = athlete.platformName || '';
            const onPlatform = platform ? ` on ${platform}` : '';
            if (currentStatus === 'lifting') {
                text = `${name} is now lifting${onPlatform}!`;
            } else if (currentStatus === 'on-deck') {
                text = `${name} is on deck${onPlatform}! Get ready!`;
            } else if (currentStatus === 'done' && lastAnnouncedStatus !== null) {
                const result = getLastLiftResult(athlete);
                if (result === 'record') {
                    text = `${name} has finished${onPlatform} with a new state record!`;
                } else if (result === 'good') {
                    text = `${name} is done${onPlatform}. Good lift!`;
                } else if (result === 'failed') {
                    text = `${name} is done${onPlatform}. Failed attempt.`;
                } else {
                    text = `${name} has finished their lift${onPlatform}!`;
                }
            }

            const prevStatus = lastAnnouncedStatus;
            lastAnnouncedStatus = currentStatus;
            if (text) speakAnnouncement(text, prevStatus);
        }

        function testVoice() {
            const cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
            const name = cfg.athleteName || 'Your athlete';
            speakAnnouncement(`${name} is on deck! Get ready!`);
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('refreshToggle');
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>Auto-Refresh: OFF';
                btn.style.background = 'rgba(96, 165, 250, 0.8)';
                localStorage.setItem('coachesAutoRefresh', 'off');
            } else {
                const cfg = JSON.parse(localStorage.getItem('trplConfig') || '{}');
                const intervalMs = (cfg.autoRefreshSeconds || 20) * 1000;
                autoRefreshInterval = setInterval(function() {
                    loadDisplay(true);
                }, intervalMs);
                btn.innerHTML = `<i class="fas fa-sync-alt fa-spin me-2"></i>Auto-Refresh: ON`;
                btn.style.background = 'rgba(16, 185, 129, 0.8)';
                localStorage.setItem('coachesAutoRefresh', 'on');
                lastAnnouncedStatus = null; // Reset so current status re-announces
                // Prime speech synthesis now while we're inside a user gesture,
                // so timer-based announcements will work without needing another click
                if (window.speechSynthesis && cfg.announcementsEnabled) {
                    const primer = new SpeechSynthesisUtterance('');
                    primer.volume = 0;
                    window.speechSynthesis.speak(primer);
                }
                loadDisplay();
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            // Restore auto-refresh state (toggleAutoRefresh calls loadDisplay internally)
            if (localStorage.getItem('coachesAutoRefresh') === 'on') {
                toggleAutoRefresh();
            } else {
                loadDisplay();
            }
        });

        // Re-announce current status when user returns to this tab
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                lastAnnouncedStatus = null;
            }
        });

        async function loadDisplay(preserveScroll = false) {
            const scrollPosition = preserveScroll ? window.pageYOffset || document.documentElement.scrollTop : 0;

            const configStr = localStorage.getItem('trplConfig');
            if (!configStr) {
                document.getElementById('displayContainer').innerHTML = '<p style="text-align: center; font-size: 2rem;">No configuration found. Please go to Setup.</p>';
                return;
            }

            try {
                const config = JSON.parse(configStr);
                schoolName = config.schoolName || '';

                // Init state records and detect gender from sheet title
                initStateRecordsStorage();
                coachStateRecords = JSON.parse(localStorage.getItem('trplStateRecords2_M') || '{}');
                fetch(`proxy.php?type=sheets&id=${config.spreadsheetId}`)
                    .then(r => r.text()).then(html => {
                        const m = html.match(/<title>([^<]+)<\/title>/);
                        if (m) {
                            const t = m[1].toLowerCase();
                            coachGender = (t.includes('women') || t.includes('girl') || t.includes('female')) ? 'W' : 'M';
                        }
                        const key = `trplStateRecords2_${coachGender}`;
                        coachStateRecords = JSON.parse(localStorage.getItem(key) || '{}');
                    }).catch(() => {});

                const platforms = config.sheets.filter(s => s.name.toLowerCase().startsWith('platform'));

                if (platforms.length === 0) {
                    document.getElementById('displayContainer').innerHTML = '<p style="text-align: center; font-size: 2rem;">No platform sheets found.</p>';
                    return;
                }

                await loadPlatformsData(config, platforms);


                if (preserveScroll && scrollPosition > 0) {
                    setTimeout(() => {
                        window.scrollTo({ top: scrollPosition, behavior: 'instant' });
                    }, 100);
                }

            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadPlatformsData(config, platforms) {
            const container = document.getElementById('displayContainer');

            // Save which athletes have their details expanded (keyed by athlete name)
            const expandedNames = new Set();
            container.querySelectorAll('.athlete-details.open').forEach(el => {
                const nameEl = el.previousElementSibling?.querySelector('.athlete-name');
                if (nameEl) expandedNames.add(nameEl.textContent.trim().split('\n')[0].trim());
            });

            container.innerHTML = '';

            // Load all platforms in parallel
            const platformResults = await Promise.all(platforms.map(async platform => {
                try {
                    const { athletes, cacheStatus, cacheAge } = await loadPlatformData(config.spreadsheetId, platform.gid);
                    const currentColumn = getCurrentAttemptColumn(athletes);
                    const pendingFilter = currentColumn
                        ? (a) => hasPendingInColumn(a, currentColumn)
                        : (a) => hasAnyPendingAttempt(a);

                    const allSorted = sortAthletesByLiftingOrder(athletes).filter(pendingFilter);
                    const platformPositionMap = {};
                    allSorted.forEach((a, idx) => { platformPositionMap[a.sheetOrder] = idx + 1; });

                    const schoolAthletes = athletes.filter(a =>
                        a.school && a.school.toLowerCase().includes(schoolName.toLowerCase())
                    );
                    schoolAthletes.forEach(a => {
                        a.platformName = platform.name;
                        a.platformGid = platform.gid;
                        a.platformPosition = platformPositionMap[a.sheetOrder] || 0;
                        a.hasPending = pendingFilter(a);
                        a.currentColumn = currentColumn;
                    });
                    return { schoolAthletes, cacheStatus, cacheAge };
                } catch (error) {
                    console.error(`Error loading ${platform.name}:`, error);
                    return { schoolAthletes: [], cacheStatus: null, cacheAge: null };
                }
            }));

            // Update cache status badge from first successful result
            const firstCache = platformResults.find(r => r.cacheStatus);
            if (firstCache) updateCacheBadge(firstCache.cacheStatus, firstCache.cacheAge);

            // Combine all school athletes and sort by platform position across all platforms
            const allSchoolAthletes = platformResults.flatMap(r => r.schoolAthletes);
            allSchoolAthletes.sort((a, b) => {
                if (!a.hasPending && b.hasPending) return 1;
                if (a.hasPending && !b.hasPending) return -1;
                return (a.platformPosition || 999) - (b.platformPosition || 999);
            });

            announceIfNeeded(allSchoolAthletes, config);

            if (allSchoolAthletes.length > 0) {
                renderAllAthletes(allSchoolAthletes);

                // Restore expanded state by athlete name
                if (expandedNames.size > 0) {
                    container.querySelectorAll('.athlete-details').forEach(el => {
                        const nameEl = el.previousElementSibling?.querySelector('.athlete-name');
                        const name = nameEl?.textContent.trim().split('\n')[0].trim();
                        if (name && expandedNames.has(name)) {
                            el.classList.add('open');
                            const arrow = document.getElementById('arrow-' + el.id);
                            if (arrow) arrow.style.transform = 'rotate(180deg)';
                        }
                    });
                }
            }
        }

        async function loadPlatformData(spreadsheetId, gid) {
            const csvUrl = `proxy.php?id=${spreadsheetId}&gid=${gid}`;

            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error(`Failed to fetch platform data: ${response.status}`);

            const cacheStatus = response.headers.get('X-Cache') || 'MISS';
            const cacheAge    = response.headers.get('X-Cache-Age');

            const csvText = await response.text();
            const csvData = parseCSV(csvText);
            return { athletes: parseAthletes(csvData), cacheStatus, cacheAge };
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];

            for (let line of lines) {
                if (!line.trim()) continue;

                const values = [];
                let current = '';
                let inQuotes = false;

                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim().replace(/^"|"$/g, ''));
                result.push(values);
            }

            return result;
        }

        function parseAthletes(csvData) {
            const athletes = [];
            let headerRow = -1;
            let nameCol = -1, schoolCol = -1, weightClassCol = -1, bodyWeightCol = -1, totalCol = -1;
            let squat1Col = -1, squat2Col = -1, squat3Col = -1;
            let bench1Col = -1, bench2Col = -1, bench3Col = -1;
            let dead1Col = -1, dead2Col = -1, dead3Col = -1;

            for (let i = 0; i < Math.min(15, csvData.length); i++) {
                const row = csvData[i];
                for (let j = 0; j < row.length; j++) {
                    const cell = row[j].toLowerCase().trim();
                    if ((cell === 'name' || cell === 'lifter') && nameCol === -1) nameCol = j;
                    if (cell === 'school' && schoolCol === -1) schoolCol = j;
                    if ((cell === 'weight class' || cell === 'wt class' || cell === 'wt. class' || cell === 'class' || cell === 'wc' || (cell.includes('wt') && cell.includes('class'))) && weightClassCol === -1) weightClassCol = j;
                    if ((cell === 'body weight' || cell === 'bw' || cell === 'bodyweight') && bodyWeightCol === -1) bodyWeightCol = j;
                    if (cell === 'total' && totalCol === -1) totalCol = j;
                    if ((cell === 'squat 1' || cell === 'sq1' || cell === 'squat1' || cell === 'f') && squat1Col === -1) squat1Col = j;
                    if ((cell === 'squat 2' || cell === 'sq2' || cell === 'squat2') && squat2Col === -1) squat2Col = j;
                    if ((cell === 'squat 3' || cell === 'sq3' || cell === 'squat3') && squat3Col === -1) squat3Col = j;
                    if ((cell === 'bench 1' || cell === 'bp1' || cell === 'bench1') && bench1Col === -1) bench1Col = j;
                    if ((cell === 'bench 2' || cell === 'bp2' || cell === 'bench2') && bench2Col === -1) bench2Col = j;
                    if ((cell === 'bench 3' || cell === 'bp3' || cell === 'bench3') && bench3Col === -1) bench3Col = j;
                    if ((cell === 'deadlift 1' || cell === 'dead 1' || cell === 'dl1' || cell === 'deal lift 1') && dead1Col === -1) dead1Col = j;
                    if ((cell === 'deadlift 2' || cell === 'dead 2' || cell === 'dl2' || cell === 'dead lift 2') && dead2Col === -1) dead2Col = j;
                    if ((cell === 'deadlift 3' || cell === 'dead 3' || cell === 'dl3' || cell === 'dead lift 3') && dead3Col === -1) dead3Col = j;
                }

                if (nameCol !== -1 && schoolCol !== -1) {
                    headerRow = i;
                    break;
                }
            }

            if (headerRow === -1) return athletes;

            // Check the row(s) after the header for attempt sub-headers
            function scanSubHeaderRow(row) {
                for (let j = 0; j < row.length; j++) {
                    const cell = row[j].toLowerCase().trim();
                    if ((cell === 'squat 1' || cell === 'sq1' || cell === 'sq 1' || cell === 'squat1') && squat1Col === -1) squat1Col = j;
                    if ((cell === 'squat 2' || cell === 'sq2' || cell === 'sq 2' || cell === 'squat2') && squat2Col === -1) {
                        squat2Col = j;
                        if (squat1Col === -1 && j > 0) squat1Col = j - 1;
                        if (squat3Col === -1 && j < row.length - 1) squat3Col = j + 1;
                    }
                    if ((cell === 'squat 3' || cell === 'sq3' || cell === 'sq 3' || cell === 'squat3') && squat3Col === -1) squat3Col = j;
                    if ((cell === 'bench 1' || cell === 'bp1' || cell === 'bp 1' || cell === 'bench1') && bench1Col === -1) bench1Col = j;
                    if ((cell === 'bench 2' || cell === 'bp2' || cell === 'bp 2' || cell === 'bench2') && bench2Col === -1) {
                        bench2Col = j;
                        if (bench1Col === -1 && j > 0) bench1Col = j - 1;
                        if (bench3Col === -1 && j < row.length - 1) bench3Col = j + 1;
                    }
                    if ((cell === 'bench 3' || cell === 'bp3' || cell === 'bp 3' || cell === 'bench3') && bench3Col === -1) bench3Col = j;
                    if ((cell === 'dead lift 1' || cell === 'deal lift 1' || cell === 'dl1' || cell === 'dl 1' || cell === 'deadlift 1' || cell === 'dead 1') && dead1Col === -1) dead1Col = j;
                    if ((cell === 'dead lift 2' || cell === 'dl2' || cell === 'dl 2' || cell === 'deadlift 2' || cell === 'dead 2') && dead2Col === -1) {
                        dead2Col = j;
                        if (dead1Col === -1 && j > 0) dead1Col = j - 1;
                        if (dead3Col === -1 && j < row.length - 1) dead3Col = j + 1;
                    }
                    if ((cell === 'dead lift 3' || cell === 'dl3' || cell === 'dl 3' || cell === 'deadlift 3' || cell === 'dead 3') && dead3Col === -1) dead3Col = j;
                }
            }
            if (csvData[headerRow + 1]) {
                scanSubHeaderRow(csvData[headerRow + 1]);
                headerRow = headerRow + 1;
            }
            if (squat1Col === -1 && bench1Col === -1 && dead1Col === -1 && csvData[headerRow + 1]) {
                scanSubHeaderRow(csvData[headerRow + 1]);
                headerRow = headerRow + 1;
            }

            // Additional fallback: if we have columns for attempt 1 and 2, infer attempt 3
            if (squat1Col !== -1 && squat2Col !== -1 && squat3Col === -1) {
                squat3Col = squat2Col + 1;
            }
            if (bench1Col !== -1 && bench2Col !== -1 && bench3Col === -1) {
                bench3Col = bench2Col + 1;
            }
            if (dead1Col !== -1 && dead2Col !== -1 && dead3Col === -1) {
                dead3Col = dead2Col + 1;
            }

            for (let i = headerRow + 1; i < csvData.length; i++) {
                const row = csvData[i];
                if (row.length <= nameCol) continue;

                const name = row[nameCol]?.trim();
                if (!name) continue;

                const rawWc = weightClassCol !== -1 ? row[weightClassCol]?.trim() : '';
                const designation = rawWc?.toUpperCase().includes('JV') ? 'JV' : 'V';
                const weightClass = rawWc?.match(/(\d+)/)?.[1] || rawWc;
                athletes.push({
                    name: name,
                    school: schoolCol !== -1 ? row[schoolCol]?.trim() : '',
                    designation,
                    weightClass,
                    bodyWeight: bodyWeightCol !== -1 ? parseFloat(row[bodyWeightCol]) || 0 : 0,
                    total: totalCol !== -1 ? parseFloat(row[totalCol]) || 0 : 0,
                    squat1: squat1Col !== -1 ? row[squat1Col]?.trim() : '',
                    squat2: squat2Col !== -1 ? row[squat2Col]?.trim() : '',
                    squat3: squat3Col !== -1 ? row[squat3Col]?.trim() : '',
                    bench1: bench1Col !== -1 ? row[bench1Col]?.trim() : '',
                    bench2: bench2Col !== -1 ? row[bench2Col]?.trim() : '',
                    bench3: bench3Col !== -1 ? row[bench3Col]?.trim() : '',
                    dead1: dead1Col !== -1 ? row[dead1Col]?.trim() : '',
                    dead2: dead2Col !== -1 ? row[dead2Col]?.trim() : '',
                    dead3: dead3Col !== -1 ? row[dead3Col]?.trim() : '',
                    sheetOrder: i - headerRow - 1
                });
            }

            return athletes;
        }

        function sortAthletesByLiftingOrder(athletes) {
            const currentColumn = getCurrentAttemptColumn(athletes);

            return [...athletes].sort((a, b) => {
                const aPending = hasPendingInColumn(a, currentColumn);
                const bPending = hasPendingInColumn(b, currentColumn);

                if (aPending && !bPending) return -1;
                if (!aPending && bPending) return 1;

                // If both have pending attempts in current column, sort by weight
                if (aPending && bPending && currentColumn) {
                    const aWeight = parseFloat(a[currentColumn].replace(/[xgXG]/g, '').trim()) || 0;
                    const bWeight = parseFloat(b[currentColumn].replace(/[xgXG]/g, '').trim()) || 0;
                    if (aWeight !== bWeight) {
                        return aWeight - bWeight; // Lightest first
                    }
                }

                return a.sheetOrder - b.sheetOrder;
            });
        }

        function getCurrentAttemptColumn(athletes) {
            const attemptColumns = [
                'squat1', 'squat2', 'squat3',
                'bench1', 'bench2', 'bench3',
                'dead1', 'dead2', 'dead3'
            ];

            for (const col of attemptColumns) {
                const hasPending = athletes.some(athlete => {
                    const value = athlete[col];
                    if (!value) return false;
                    const lower = value.toLowerCase();
                    return !lower.includes('g') && !lower.includes('x');
                });

                if (hasPending) return col;
            }

            return null;
        }

        function hasPendingInColumn(athlete, column) {
            if (!column) return false;
            const value = athlete[column];
            if (!value) return false;
            const lower = value.toLowerCase();
            return !lower.includes('g') && !lower.includes('x');
        }

        function hasAnyPendingAttempt(athlete) {
            const cols = ['squat1', 'squat2', 'squat3', 'bench1', 'bench2', 'bench3', 'dead1', 'dead2', 'dead3'];
            return cols.some(col => {
                const val = athlete[col];
                if (!val) return false;
                const lower = val.toLowerCase();
                return !lower.includes('g') && !lower.includes('x');
            });
        }

        function renderAttempt(val, liftKey, weightClass) {
            if (!val) return `<div class="attempt-cell" style="background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3);">—</div>`;
            const failed = val.toLowerCase().includes('x');
            const good = val.toLowerCase().includes('g');
            const num = val.replace(/[xgXG]/g, '').trim();
            const bg = failed ? '#ef4444' : good ? 'rgba(16,185,129,0.2)' : '#000';
            const border = failed ? '#dc2626' : good ? '#10b981' : 'rgba(96,165,250,0.2)';
            const color = failed ? 'white' : good ? '#10b981' : 'white';
            const icon = failed ? ' ✗' : good ? ' ✓' : '';
            const isRecord = !failed && liftKey && weightClass && isStateRecordAttempt(parseFloat(num), liftKey, weightClass, coachStateRecords);
            const star = isRecord ? `<i class="fas fa-star" style="color:#ef4444; font-size:0.7rem; margin-left:2px;" title="State record attempt"></i>` : '';
            return `<div class="attempt-cell" style="background:${bg}; border:1px solid ${border}; color:${color};">${num}${icon}${star}</div>`;
        }

        function renderAllAthletes(athletes) {
            const container = document.getElementById('displayContainer');
            const section = document.createElement('div');
            section.className = 'platform-section';
            let html = '';

            athletes.forEach((athlete, idx) => {
                const overallPosition = athlete.platformPosition || 0;
                let status = '', statusClass = '';

                if (!athlete.hasPending) {
                    status = 'DONE'; statusClass = 'done';
                } else if (overallPosition === 1) {
                    status = 'LIFTING'; statusClass = 'lifting';
                } else if (overallPosition === 2) {
                    status = 'ON DECK'; statusClass = 'on-deck';
                }

                let attemptWeight = '';
                if (athlete.currentColumn && athlete[athlete.currentColumn]) {
                    const weight = athlete[athlete.currentColumn].replace(/[xgXG]/g, '').trim();
                    if (weight) attemptWeight = `${weight} lbs`;
                }

                const rowClass = statusClass || 'default';
                const detailId = `detail-${idx}`;

                html += `
                    <div class="athlete-card ${rowClass}">
                        <div class="athlete-summary" onclick="toggleDetail('${detailId}')">
                            <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                                <div style="font-size:1.2rem; font-weight:700; color:white; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;">${athlete.name}</div>
                                <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
                                    ${athlete.hasPending && overallPosition > 2 ? `<span style="color:white; font-size:1.1rem; font-weight:800; white-space:nowrap;">Position ${overallPosition}</span>` : ''}
                                    ${status ? `<div class="status-badge ${statusClass}">${status}</div>` : ''}
                                    <i class="fas fa-chevron-down expand-arrow" id="arrow-${detailId}"></i>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                <span class="designation-badge ${athlete.designation === 'JV' ? 'jv' : 'varsity'}">${athlete.designation === 'JV' ? 'JV' : 'Varsity'}</span>
                                <a href="platform.html?gid=${athlete.platformGid}" onclick="event.stopPropagation();" style="background:#06b6d4; color:white; padding:3px 10px; border-radius:6px; font-size:0.8rem; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:4px; white-space:nowrap;"><i class="fas fa-layer-group"></i> ${athlete.platformName}</a>
                                ${athlete.weightClass ? `<span style="color:rgba(255,255,255,0.7); font-size:0.85rem; font-weight:700; white-space:nowrap;">${athlete.weightClass} lbs</span>` : ''}
                                ${athlete.bodyWeight ? `<span style="color:rgba(255,255,255,0.5); font-size:0.8rem; font-weight:600; white-space:nowrap;">(${athlete.bodyWeight} lbs BW)</span>` : ''}
                                ${attemptWeight ? `<span style="color:#60a5fa; font-size:0.85rem; font-weight:700; white-space:nowrap;">Attempting ${attemptWeight}</span>` : ''}
                            </div>
                        </div>
                        <div class="athlete-details" id="${detailId}">
                            <div style="margin-bottom:10px;">
                                <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;"><i class="fas fa-compress-arrows-alt me-1"></i>Squat</div>
                                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px;">${renderAttempt(athlete.squat1,'sq',athlete.weightClass)}${renderAttempt(athlete.squat2,'sq',athlete.weightClass)}${renderAttempt(athlete.squat3,'sq',athlete.weightClass)}</div>
                            </div>
                            <div style="margin-bottom:10px;">
                                <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;"><i class="fas fa-hands me-1"></i>Bench Press</div>
                                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px;">${renderAttempt(athlete.bench1,'bp',athlete.weightClass)}${renderAttempt(athlete.bench2,'bp',athlete.weightClass)}${renderAttempt(athlete.bench3,'bp',athlete.weightClass)}</div>
                            </div>
                            <div style="margin-bottom:10px;">
                                <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;"><i class="fas fa-weight-hanging me-1"></i>Deadlift</div>
                                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px;">${renderAttempt(athlete.dead1,'dl',athlete.weightClass)}${renderAttempt(athlete.dead2,'dl',athlete.weightClass)}${renderAttempt(athlete.dead3,'dl',athlete.weightClass)}</div>
                            </div>
                            ${athlete.total ? `<div class="total-box"><div class="total-label">TOTAL</div><div class="total-value">${athlete.total} lbs</div></div>` : ''}
                        </div>
                    </div>
                `;
            });

            section.innerHTML = html;
            container.appendChild(section);
        }

        function toggleDetail(id) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            const arrow = document.getElementById('arrow-' + id);
            if (arrow) arrow.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }
        function updateCacheBadge(cacheHit, cacheAge) {
            const badge = document.getElementById('cacheStatusBadge');
            if (!badge) return;
            const ageStr = cacheAge ? ` · ${cacheAge} old` : '';
            if (cacheHit === 'HIT') {
                badge.style.background = 'rgba(34,197,94,0.15)';
                badge.style.color = '#4ade80';
                badge.style.border = '1px solid rgba(34,197,94,0.3)';
                badge.textContent = `cache HIT${ageStr}`;
            } else if (cacheHit === 'STALE') {
                badge.style.background = 'rgba(234,179,8,0.15)';
                badge.style.color = '#facc15';
                badge.style.border = '1px solid rgba(234,179,8,0.3)';
                badge.textContent = `cache STALE${ageStr}`;
            } else {
                badge.style.background = 'rgba(96,165,250,0.15)';
                badge.style.color = '#60a5fa';
                badge.style.border = '1px solid rgba(96,165,250,0.3)';
                badge.textContent = 'cache MISS · fetched from Google';
            }
            badge.style.display = 'inline-block';
        }
    </script>
</body>
</html>
